<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="">First Name :</label>
        <input type="text" placeholder="Enter First Name" pattern="[a-zZ-A]{3,}"> <br><br>
        <label for="">Last Name :</label>
        <input type="text" placeholder="Enter Last Name" pattern="[a-zZ-A]{3,}"> <br><br>
        <label for="">Email :</label>
        <input type="email" placeholder="Enter Email"><br><br>
        <label for="">Password :</label>
        <input type="Password"><br><br>
        <label for="">Phon :</label>
        <input type="tel" pattern="[0-9]{10}"><br><br>
        <label for="">DOB :</label>
        <input type="date" ><br><br>
        <label for="">Gender :</label>
        <label for="">Male</label>
        <input type="radio" name="gender" value="Male">
        <label for="">Female</label>
        <input type="radio" name="gender" value="Female">
        <label for="">Other</label>
        <input type="radio" name="gender" value="Other"> <br><br>
        <label for="">Age :</label>
        <input type="number" min="18" max="32"><br> <br>
        <label for="">Preferences :</label>
        <label for="">Acrylic painting</label>
        <input type="checkbox" name="painting" value="Acrylic-painting">
        <label for="">Oil painting</label>
        <input type="checkbox" name="painting" value="Oil-painting">
        <label for="">Water color painting</label>
        <input type="checkbox" name="painting" value="Water-color-painting"><br><br>
        <input type="submit">
    </form>
</body>
</html>
