    <style>
        * {
            margin: 0px;
        }

        div {
            padding: 20px;
            text-align: center;
        }

        a {
            padding: 30px;
            text-decoration: none;
            font-family: cursive;
            font-size: 20px;
            color: black;
        }

        a:hover {
            color: orange;
            text-shadow: 0px 2px 5px gray;
        }

        .container {
            width: 500px;
            height: 500px;
            margin: 100px auto;
            border-radius: 20px;
            box-shadow: 0px 0px 5px 5px gray;
            position: relative;
            background-color: rgb(248, 235, 216);

        }
        .jsp,.psp{
            border: 2px solid black;
        }
        .jsp{
            position: absolute;
            top: 0px;
            left: 0px;
            border-radius: 20px 0px 20px 0px;

        }
        .jsp::first-letter{
            color: orange;
        }
        .psp::first-letter{
            color: orange;
        }
        .psp{
            position: absolute;
            top: 0px;
            right: 0px;
            border-radius: 0px 20px 0px 20px;
        }
        .img-container{
            height: 200px;
            width: 200px;
            border: 5px solid black;
            position: absolute;
            top: 100px;
            right: 50px;
            border-radius: 50%;
            padding: 0px;

        }
        img{
            height: inherit;
            width: inherit;
            border-radius: inherit;
        }
        .content
        {
            position: absolute;
            top: 100px;
            left: 10px;
        }
        h1{
 font-family: "Monsieur La Doulaise", cursive;
  font-weight: 400;
  font-style: normal;
        }
    </style>
</head>
