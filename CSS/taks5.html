<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
        }
        .div-1{
            background-color: brown;
            position: absolute;
            z-index: -3;
            top: 400px;
            left: 100px;
        }
         .div-2{
            background-color:darkcyan;
            position: absolute;
            z-index: 5;
            top: 100px;
            left: 100px;
        }
         .div-3{
            background-color:darkgoldenrod;
            position: absolute;
            z-index: -1;
            left: 400px;
            top: 100px;
        }
         .div-4{
            background-color: aqua;
            position: absolute;
            z-index: 5;
            top: 400px;
            left: 400px;
        }
         .div-5{
            background-color: blueviolet;
            position: absolute;
            z-index: 1;
            top:250px ;
            left: 250px;
        }
    </style>
</head>
<body>
    <div class="div-1"></div>
    <div class="div-2"></div>
    <div class="div-3"></div>
    <div class="div-4"></div>
    <div class="div-5"></div>
</body>
</html>
