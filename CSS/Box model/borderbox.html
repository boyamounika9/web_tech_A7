<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            font-size: 30px;
        }
        .content{
            height: 200px;
            width: 200px;
            background-color: aqua;
            padding: 30px;
            border:10px solid;
            box-sizing: content-box;
        }
         .border{
            height: 200px;
            width: 200px;
            background-color: rgb(71, 50, 208);
            padding: 30px;
            border:10px solid;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="content">content-box</div><br>
    <div class="border">border-box</div>
</body>
</html>
