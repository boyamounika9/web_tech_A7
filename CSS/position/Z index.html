<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
        }
        .div-1{
            background-color: blueviolet;
            position: absolute;
            z-index: 1;
            top: 100px;
            left: 100px;
            box-shadow: 10px 10px 5px 5px gray;
        }
        .div-2{
            background-color: rgb(125, 220, 61);
            position: absolute;
            z-index: -1;
            top: 50px;
            left: 50px;
            box-shadow: 10px 10px 5px 5px gray;
        }
        .div-3{
            background-color: rgb(242, 58, 113);
            position: absolute;
            z-index: -2;
            box-shadow: 10px 10px 5px 5px gray ;
        }


    </style>
</head>
<body>
    <div class="div-1"></div>
    <div class="div-2"></div>
    <div class="div-3"></div>
</body>
</html>
