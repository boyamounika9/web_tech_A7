<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            height: 100vh;
            background-color: black;
            display: flex;
            justify-content: right;
            justify-content: space-around;
            align-items: center;
        }
        div{
            height: 200px;
            width: 200px;
        }
        .div-1{
            background-color: lightblue;
        }
        .div-2{
            background-color: rgb(176, 127, 214);
        }
        .div-3{
            background-color: lightgoldenrodyellow;
        }
        .div-4{
            background-color: lightgreen;
        }
        .div-5{
            background-color: lightseagreen;
        }
        .div-6{
            background-color: lightsalmon;
        }
    </style>
</head>
<body>
    <section>
        <div class="div-1"></div>
        <div class="div-2"></div>
        <div class="div-3"></div>
        <div class="div-4"></div>
        <div class="div-5"></div>
        <div class="div-6"></div>
    </section>
</body>
</html>
