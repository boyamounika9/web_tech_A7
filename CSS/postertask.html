<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
        }
        section{
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .poster {
            height: 650px;
            width: 800px;
            background-color: #864F3B;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            height: 550px;
            width: 700px;
            background-color: white;
            box-shadow: 0px 0px 5px 5px #763016;
            border-radius: 5px;
            display: flex;

        }

        .content {
            height: 550px;
            width: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

        }

        h1 {
            margin-top: 20px;
            font-family:sans-serif;
        }

        .img {
            height: 150px;
            width: 150px;
            background-color: rgb(123, 174, 218);
            border-radius: 50%;
            box-shadow: 0px 0px 5px 5px wheat;


        }

        img {
            height: inherit;
            width: inherit;
            border-radius: inherit;
        }

        button {
            border: solid 2px #864F3B;
            height: 45px;
            width: 200px;
            color: #864F3B;
            font-size: 25px;
            font-family: 'Times New Roman', Times, serif;
            border-radius: 40px;
            margin-top: 30px;
            font-weight: bold;
        }

        button:hover {
            background-color: #864F3B;
            color: white;
        }

        .side {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .side1,
        .side2,
        .side3 {
            height: 180px;
            width: 250px;
            background-color: #f0ddd7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .side1:hover,
        .side2:hover,
        .side3:hover{
            background-color: #864F3B;
        }
        

        .sub {
            font-size: 40px;
        }

        p {
            font-size: 20px;
        }
    </style>
</head>

<body>
    <section>
    <div class="poster">
        <div class="container">
            <div class="content">
                <div class="img"><img src="../CSS/asserts/mounika image.jpeg" alt="">
                </div>
                <h1>Boya Mounika</h1>
                <p>MERN Stack Developer</p>
                <button>Follow</button>
                <button>Message</button>

            </div>
            <div class="side">
                <div class="side1">
                    <h2 class="sub">523</h2>
                    <P>Posts</P>
                </div>
                <div class="side2">
                    <h2 class="sub">1387</h2>
                    <P>Likes</P>
                </div>
                <div class="side3">
                    <h2 class="sub">146</h2>
                    <P>Follower</P>
                </div>
            </div>
        </div>
    </div>
    </section>
</body>

</html>
